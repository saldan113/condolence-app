name: Send Monthly Stats Report

on:
  workflow_dispatch:  # Allows manual testing button
  schedule:
    # Runs at 23:00 UTC (6 PM CST) on the 28th, 29th, 30th, and 31st of the month
    - cron: '0 23 28-31 * *'

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pandas gspread google-auth openpyxl

    - name: Inject Secure Google Key
      run: |
        echo '${{ secrets.GOOGLE_CREDS_JSON }}' > google_creds.json

    - name: Run Report
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "Manual trigger detected. Running report immediately."
          python monthly_report.py
        else
          TOMORROW=$(date -d "tomorrow" +%d)
          if [ "$TOMORROW" -eq "01" ]; then
            python monthly_report.py
          else
            echo "Not the last day of the month yet. Skipping automated run."
          fi
        fi
