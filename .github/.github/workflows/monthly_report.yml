name: Send Monthly Stats Report

on:
  schedule:
    # Runs at 23:00 UTC (6 PM CST) on the 28th, 29th, 30th, and 31st of the month
    - cron: '0 23 28-31 * *'

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pandas gspread google-auth openpyxl

    - name: Check if Last Day of Month and Run
      run: |
        TOMORROW=$(date -d "tomorrow" +%d)
        if [ "$TOMORROW" -eq "01" ]; then
          python monthly_report.py
        else
          echo "Not the last day of the month yet. Skipping execution."
        fi
